# REMOVED 'user nginx;' - Forbidden when running as non-root user
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;  # ← ADD THIS LINE - writable location for non-root user

events {
  worker_connections 1024;
}

http {

  client_body_temp_path /tmp/client_temp;
  proxy_temp_path       /tmp/proxy_temp;
  fastcgi_temp_path     /tmp/fastcgi_temp;
  uwsgi_temp_path       /tmp/uwsgi_temp;
  scgi_temp_path        /tmp/scgi_temp;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 20M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml+rss
    application/rss+xml font/truetype font/opentype
    application/vnd.ms-fontobject image/svg+xml;

  server {
    listen 80;  # ✅ FIXED: Changed from 8080 to 80 (matches docker-compose port mapping and Dockerfile EXPOSE)
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Cache busting for versioned assets
    location ~* ^/(\d+\.\d+\.\d+|main|polyfills).*\.(js|css)$ {
      add_header Cache-Control "public, immutable";
      expires 1y;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      expires 1y;
    }

    # API proxy - route API calls to backend
    location /api/ {
      proxy_pass http://ems-api-28551.centralindia.azurecontainer.io:5000; # ✅ FIXED: Changed from 8080 to 5000 (matches docker-compose and API Dockerfile)
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # Angular SPA - serve index.html for all other routes
    location / {
      try_files $uri $uri/ /index.html;

      # Prevent caching of index.html
      add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
      add_header Pragma "no-cache";
      add_header Expires "0";
    }

    # Health check endpoint
    location /health {
      access_log off;
      return 200 '{"status":"healthy"}';
      add_header Content-Type application/json;
    }

    # Deny access to sensitive files
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }
  }
}
