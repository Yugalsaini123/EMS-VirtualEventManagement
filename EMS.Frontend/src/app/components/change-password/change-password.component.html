<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h3 class="card-title mb-3">Change Password</h3>

          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>

          <div *ngIf="successMessage" class="alert alert-success" role="alert">
            {{ successMessage }}
          </div>

          <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="oldPassword" class="form-label">Current Password</label>
              <input
                id="oldPassword"
                type="password"
                class="form-control"
                formControlName="oldPassword"
                [class.is-invalid]="submitted && f['oldPassword'].invalid"
              />
              <div *ngIf="submitted && f['oldPassword'].invalid" class="invalid-feedback">
                <div *ngIf="f['oldPassword'].errors?.['required']">Current password is required.</div>
                <div *ngIf="f['oldPassword'].errors?.['minlength']">Password must be at least 4 characters.</div>
              </div>
            </div>

            <div class="mb-3">
              <label for="newPassword" class="form-label">New Password</label>
              <input
                id="newPassword"
                type="password"
                class="form-control"
                formControlName="newPassword"
                [class.is-invalid]="submitted && f['newPassword'].invalid"
              />
              <div *ngIf="submitted && f['newPassword'].invalid" class="invalid-feedback">
                <div *ngIf="f['newPassword'].errors?.['required']">New password is required.</div>
                <div *ngIf="f['newPassword'].errors?.['minlength']">New password must be at least 6 characters.</div>
              </div>
            </div>

            <div class="mb-3">
              <label for="confirmNewPassword" class="form-label">Confirm New Password</label>
              <input
                id="confirmNewPassword"
                type="password"
                class="form-control"
                formControlName="confirmNewPassword"
                [class.is-invalid]="submitted && (f['confirmNewPassword'].invalid || passwordForm.errors?.['passwordMismatch'])"
              />
              <div *ngIf="submitted && (f['confirmNewPassword'].invalid || passwordForm.errors?.['passwordMismatch'])" class="invalid-feedback">
                <div *ngIf="f['confirmNewPassword'].errors?.['required']">Please confirm your new password.</div>
                <div *ngIf="passwordForm.errors?.['passwordMismatch']">Passwords do not match.</div>
              </div>
            </div>

            <button class="btn btn-primary w-100" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              Change Password
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
